<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TaskFlow - Sign In</title>

                    "primary-fixed": "#d8e2ff",
                    "error-container": "#ffdad6",
                    "on-background": "#111c2d",
                    "on-secondary-fixed": "#23005c",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-fixed": "#191c1e",
                    "on-secondary-fixed-variant": "#5516be",
                    "on-surface-variant": "#424754",
                    "surface-container-low": "#f0f3ff",
                    "primary": "#0058be",
                    "on-primary-fixed-variant": "#004395",
                    "inverse-surface": "#263143",
                    "tertiary-container": "#727577",
                    "secondary": "#6b38d4",
                    "tertiary-fixed-dim": "#c4c7c9",
                    "on-tertiary-fixed-variant": "#444749",
                    "on-secondary-container": "#fffbff",

                    "surface-dim": "#cfdaf2",

                    "on-secondary": "#ffffff",

                    "on-tertiary-container": "#fbfdff",
                    "on-primary-container": "#fefcff",
                    "surface": "#f9f9ff",
                    "on-primary": "#ffffff",
                    "inverse-on-surface": "#ecf1ff",
                    "on-error-container": "#93000a",
                    "surface-tint": "#005ac2",
                    "secondary-fixed": "#e9ddff",
                    "outline": "#727785",
                    "surface-container-high": "#dee8ff",

            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",

            "spacing": {
                    "container-margin": "24px",
                    "stack-lg": "32px",

            "fontFamily": {

<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9ff;
            color: #111c2d;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .primary-gradient-btn {
            background: linear-gradient(135deg, #0058be 0%, #6b38d4 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(0, 88, 190, 0.25);
        }

        .primary-gradient-btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        .input-focus-ring:focus {
            outline: none;
            border-color: #0058be;
            box-shadow: 0 0 0 4px rgba(0, 88, 190, 0.1);
        }

        .glass-background {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Subtle atmospheric movement for the background */
        .ambient-blob {
            position: fixed;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.4;
            border-radius: 50%;
            animation: drift 20s infinite alternate;
        }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 50px) scale(1.1); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background">
<!-- Ambient Background Decorations -->
<div class="ambient-blob bg-primary w-[400px] h-[400px] -top-20 -left-20"></div>
<div class="ambient-blob bg-secondary w-[350px] h-[350px] -bottom-20 -right-20" style="animation-delay: -5s;"></div>
<main class="w-full max-w-[440px] px-container-margin py-stack-lg flex flex-col items-center">
<!-- App Logo & Branding -->
<div class="flex flex-col items-center mb-stack-lg animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="w-20 h-20 bg-primary rounded-[24px] flex items-center justify-center shadow-2xl mb-stack-md rotate-12 hover:rotate-0 transition-transform duration-500">
<span class="material-symbols-outlined text-white text-[48px]" style="font-variation-settings: 'FILL' 1;">
                    grid_view
                </span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight mb-2">TaskFlow</h1>
<p class="font-label-lg text-label-lg text-on-surface-variant opacity-70">Reference React Native architecture</p>
</div>
<!-- Sign-In Form Container -->
<div class="w-full bg-white rounded-[32px] p-8 shadow-[0_15px_40px_-15px_rgba(0,0,0,0.08)] border border-outline-variant/30 animate-in fade-in slide-in-from-bottom-8 duration-700 delay-150">
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-lg text-label-lg text-on-surface-variant block ml-1" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">
                            mail
                        </span>
<input class="w-full h-[56px] pl-12 pr-4 bg-surface-container-low border border-outline-variant rounded-[16px] font-body-md text-body-md text-on-surface input-focus-ring transition-all" id="email" name="email" placeholder="Enter your email" type="email" value="demo@studio.app"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label-lg text-label-lg text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">
                            lock
                        </span>
<input class="w-full h-[56px] pl-12 pr-12 bg-surface-container-low border border-outline-variant rounded-[16px] font-body-md text-body-md text-on-surface input-focus-ring transition-all" id="password" name="password" placeholder="••••••••" type="password" value="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full h-[56px] primary-gradient-btn rounded-[16px] text-white font-label-lg text-label-lg flex items-center justify-center gap-2 group" type="submit">
                    Sign in
                    <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">
                        arrow_forward
                    </span>
</button>
<!-- Status Note -->
<div class="flex items-center justify-center gap-2 pt-2">
<span class="w-1.5 h-1.5 bg-secondary rounded-full animate-pulse"></span>
<p class="font-label-md text-label-md text-on-surface-variant italic">
                        Demo credentials are pre-filled. Tap Sign in.
                    </p>
</div>
</form>
</div>
<!-- Footer / Social Links -->
<div class="mt-stack-lg flex flex-col items-center gap-stack-sm animate-in fade-in duration-1000 delay-500">
<p class="font-label-md text-label-md text-outline">Or continue with</p>
<div class="flex gap-4">
<button class="w-12 h-12 rounded-xl bg-white border border-outline-variant flex items-center justify-center hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface">brand_family</span>
</button>
<button class="w-12 h-12 rounded-xl bg-white border border-outline-variant flex items-center justify-center hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface">apps</span>
</button>
</div>
<p class="mt-stack-md font-body-md text-body-md text-on-surface-variant">
                Don't have an account? <a class="text-primary font-semibold hover:underline" href="#">Sign up</a>
</p>
</div>
</main>
<!-- Script for micro-interactions -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('form');
            const submitBtn = form.querySelector('button[type="submit"]');

            submitBtn.addEventListener('click', (e) => {
                const originalContent = submitBtn.innerHTML;
                submitBtn.innerHTML = `
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Signing in...
                `;
                
                // Simulate a login delay
                setTimeout(() => {
                    submitBtn.innerHTML = `
                        <span class="material-symbols-outlined">check_circle</span>
                        Welcome back!
                    `;
                    submitBtn.classList.replace('primary-gradient-btn', 'bg-emerald-500');
                }, 1200);
            });

            // Focus animation for input icons
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.previousElementSibling.classList.add('text-primary');
                });
                input.addEventListener('blur', () => {
                    input.previousElementSibling.classList.remove('text-primary');
                });
            });
        });
    </script>
</body></html>
