<style>

      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar - Execution from JSON -->
<header class="bg-background dark:bg-background flex justify-between items-center px-container-margin py-stack-md w-full docked full-width top-0 z-50">
<div class="flex items-center gap-stack-sm">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary" style="font-size: 24px;">grid_view</span>
<span class="text-headline-sm font-headline-sm font-bold text-on-surface dark:text-on-surface">TaskFlow</span>
</div>
<button class="gradient-button text-on-primary px-stack-md py-stack-sm rounded-xl text-label-lg font-label-lg hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-150">
            + New
        </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center px-container-margin pt-stack-lg pb-32">
<!-- Header Text Section -->
<div class="w-full max-w-xl mb-stack-lg">
<h1 class="text-headline-lg-mobile font-headline-lg-mobile text-on-surface mb-1">Tasks</h1>
<p class="text-body-md font-body-md text-on-surface-variant">Team backlog</p>
</div>
<!-- Central Error State Component -->
<div class="flex-grow flex flex-col items-center justify-center text-center max-w-sm w-full py-stack-lg animate-fade-in">
<!-- Atmospheric Shader Background (Subtle layer) -->
<div class="relative w-full aspect-square max-w-[280px] flex items-center justify-center">
<div class="absolute inset-0 bg-surface-container-low rounded-full blur-3xl opacity-60"></div>
<!-- Large Warning Graphic -->
<div class="relative z-10 flex flex-col items-center">
<div class="bg-error-container text-error w-20 h-20 rounded-3xl flex items-center justify-center mb-stack-md card-shadow border border-error/10">
<span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<h2 class="text-headline-md font-headline-md text-on-surface mt-stack-sm">We hit a snag</h2>
<p class="text-body-lg font-body-lg text-on-surface-variant mt-stack-sm">
                        Something went wrong on our side. Try again shortly.
                    </p>
</div>
</div>
<!-- Action Button -->
<button class="gradient-button mt-stack-lg text-on-primary px-10 py-stack-md rounded-2xl text-label-lg font-label-lg shadow-xl hover:opacity-90 transition-all active:scale-95" onclick="location.reload()">
                Try again
            </button>
</div>
<!-- Asymmetric Detail Illustration (Decoration) -->
<div class="hidden md:block absolute right-0 top-1/3 opacity-20 pointer-events-none">
<img class="w-64" data-alt="A minimalist digital illustration featuring fluid abstract shapes in shades of corporate blue and violet. The aesthetic is clean and productive, mimicking the movement of digital workflows. Soft gradients and high-key lighting create an airy, modern feel consistent with a professional productivity application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCGSQv0kxv4VSuab4JO3jcLWvYvFUXOQlBlpR23q8mszfWt17NAGRTp0o31QbfJ5n6ZZ0Atnrx3W2YhdV0YNvR3pXKgbmLoITYSDyt9hXn60Z8GV4iH31ZYXOVoIIlYCNnWrrhutPXVhCXwRp_z6ISg7L73e-yf5O6kafoUlrZ7BHwWEaSFKB9aE6jaolIfPimHF1VY1Dqk4phxyYB85bcYfvQdldxYG882ja6AQeVJFXvN9tWmjEe1hH6cm3c95AT0mTlTzWqD0c6t"/>
</div>
</main>
<!-- BottomNavBar - Execution from JSON -->
<!-- Active State Logic: Mapping "Tasks" to primary intent -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-6 pt-3 bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-xl border-t border-outline-variant/30 dark:border-outline-variant/10 shadow-lg rounded-t-xl">
<!-- Tab 1: Tasks (Active) -->
<a class="flex flex-col items-center justify-center text-primary dark:text-inverse-primary scale-110 transition-all duration-200" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">assignment</span>
<span class="text-label-md font-label-md">Tasks</span>
</a>
<!-- Tab 2: Profile (Inactive) -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant hover:text-primary dark:hover:text-inverse-primary transition-colors" href="#">
<span class="material-symbols-outlined mb-1">account_circle</span>
<span class="text-label-md font-label-md">Profile</span>
</a>
</nav>
<script>
        // Micro-interaction: Subtle hover parallax for the error icon
        document.addEventListener('mousemove', (e) => {
            const warningIcon = document.querySelector('.bg-error-container');
            if (warningIcon) {
                const x = (window.innerWidth / 2 - e.pageX) / 50;
                const y = (window.innerHeight / 2 - e.pageY) / 50;
                warningIcon.style.transform = `translate(${x}px, ${y}px)`;
            }
        });

        // Simulating a "Try again" loader transition
        const tryBtn = document.querySelector('button[onclick]');
        if (tryBtn) {
            tryBtn.onclick = function() {
                this.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span>';
                setTimeout(() => {
                    location.reload();
                }, 1000);
            };
        }
    </script>
